global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node-exporter' # 原有的抓取任务
    static_configs:
      - targets: ['node-exporter:9100']

  # 新增 cAdvisor 抓取任务
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080'] # 使用Docker Compose服务名直接访问

  - job_name: 'nginx-exporter'
    static_configs:
      - targets: ['nginx-exporter:9113']
  
  - job_name: 'custom-exporter'
    static_configs:
      - targets: ['custom-exporter:8000']

