version: '3'

services:
  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - monitor-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - monitor-net
  cadvisor:
    # 方案A (首选)：使用这个广泛认可的镜像
    image: docker.io/google/cadvisor:latest
     # 方案B (备选)：如果A不行，可以尝试这个
    # image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - monitor-net

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./stub-status.conf:/etc/nginx/conf.d/stub-status.conf
      - ./stub-status.conf:/etc/nginx/conf.d/default.conf
    networks:
      - monitor-net

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    ports:
      - "9113:9113"
    command: ['-nginx.scrape-uri','http://nginx:80/stub_status']
    # 这个命令告诉Exporter去哪里抓取数据。'http://nginx:80' 中的 'nginx' 是上面定义的service名，Docker网络内可直接解析。
    networks:
      - monitor-net
  custom-exporter:
    build:
      context: .
      dockerfile: Dockerfile.custom
    container_name: custom-exporter
    ports:
      - "8000:8000"
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge

